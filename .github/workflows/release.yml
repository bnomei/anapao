name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag for manual runs (for example: v0.1.2)"
        required: false
        type: string

permissions:
  contents: write

env:
  BIN_NAME: anapao

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use_cross: true
          - os: macos-15-intel
            target: x86_64-apple-darwin
            use_cross: false
          - os: macos-15
            target: aarch64-apple-darwin
            use_cross: false
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            use_cross: false

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup cross
        if: matrix.use_cross
        uses: taiki-e/setup-cross-toolchain-action@b8d1a322a6009a2b7220f53996695778eef89b41 # v1
        with:
          target: ${{ matrix.target }}

      - name: Resolve version
        id: version
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || '' }}
        run: scripts/resolve-version.sh

      - name: Build (unix)
        if: runner.os != 'Windows'
        run: TARGET=${{ matrix.target }} scripts/build-release.sh

      - name: Build (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: scripts/build-release.ps1 -Target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: TARGET=${{ matrix.target }} VERSION=${{ steps.version.outputs.version }} BIN_NAME=${{ env.BIN_NAME }} scripts/package-release.sh

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: scripts/package-release.ps1 -Target ${{ matrix.target }} -Version ${{ steps.version.outputs.version }} -BinName ${{ env.BIN_NAME }}

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist-${{ matrix.target }}
          path: dist/*

      - name: Upload GitHub Release assets
        if: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.tag != '') }}
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          fail_on_unmatched_files: true
          files: dist/*
